name: CI

# Run the test suite on every pull request and on pushes to any branch other
# than main (main is covered by the deploy workflow, which gates on tests).
on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run tests
        run: npm test
