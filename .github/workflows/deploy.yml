name: Deploy to GitHub Pages

# Deploy the static site to GitHub Pages on every push to main, but only AFTER
# the test suite passes. This replaces the legacy "Deploy from a branch" Pages
# source — see the repo settings note in the README / PR description.
on:
  push:
    branches:
      - main
  # Allow manually re-running a deploy from the Actions tab.
  workflow_dispatch:

# Permissions needed by the Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The site is served from the repo root (plain static files). node_modules
          # is never created in this job, so only the real site assets are uploaded.
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
