<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="85%">
      <stop offset="0%" stop-color="#1b245a"/>
      <stop offset="60%" stop-color="#131a40"/>
      <stop offset="100%" stop-color="#0b1026"/>
    </radialGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe27a"/>
      <stop offset="55%" stop-color="#ffb86b"/>
      <stop offset="100%" stop-color="#ff7fb3"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cdd8ff"/>
      <stop offset="45%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#aab8e8"/>
    </linearGradient>
  </defs>

  <!-- full-bleed background (OS applies its own mask shape) -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>

  <g fill="#ffffff">
    <circle cx="120" cy="140" r="4" opacity=".85"/>
    <circle cx="395" cy="160" r="4.5" opacity=".9"/>
    <circle cx="150" cy="360" r="3" opacity=".7"/>
    <circle cx="380" cy="370" r="3" opacity=".7"/>
  </g>

  <!-- rocket scaled to ~0.62 so it sits inside the maskable safe zone -->
  <g transform="translate(256 264) rotate(45) scale(0.62)">
    <path d="M0 118 C -26 86 -26 64 0 40 C 26 64 26 86 0 118 Z" fill="url(#flame)"/>
    <path d="M0 96 C -12 78 -12 64 0 50 C 12 64 12 78 0 96 Z" fill="#fff6d6" opacity=".85"/>
    <path d="M-34 28 C -60 44 -64 70 -58 86 C -42 78 -30 60 -28 40 Z" fill="#ff7fb3"/>
    <path d="M34 28 C 60 44 64 70 58 86 C 42 78 30 60 28 40 Z" fill="#ff7fb3"/>
    <path d="M0 -120 C 34 -84 40 -34 40 18 C 40 44 22 56 0 56 C -22 56 -40 44 -40 18 C -40 -34 -34 -84 0 -120 Z" fill="url(#body)"/>
    <circle cx="0" cy="-26" r="26" fill="#1b245a"/>
    <circle cx="0" cy="-26" r="20" fill="#6ce5c8"/>
    <circle cx="-7" cy="-33" r="6" fill="#d6fff4" opacity=".9"/>
    <path d="M0 -120 C -34 -84 -40 -34 -40 18 C -40 40 -28 52 -12 55 C -20 30 -20 -40 0 -120 Z" fill="#7f8fc8" opacity=".35"/>
  </g>
</svg>
